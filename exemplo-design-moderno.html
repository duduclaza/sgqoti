<!DOCTYPE html>
<html lang="pt-BR" class="transition-colors duration-300">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema Moderno</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .theme-light { --bg: #f2f2f6; --bg-header: #ffffff; --bg-sidebar: #f9f9fb; --text: #1c1c1e; --input-bg: #ffffff; --input-border: #d1d1d6; --table-header: #e5e5ea; }
    .theme-dark { --bg: #1f1f23; --bg-header: #2a2a2f; --bg-sidebar: #2a2a2f; --text: #e5e5e5; --input-bg: #2f2f35; --input-border: #444; --table-header: #3a3a3f; }
    input, select, textarea { transition: all 0.3s ease; }
    table th, table td { border-bottom: 1px solid var(--input-border); }
    tr:hover { background-color: rgba(37,99,235,0.08); cursor: pointer; }
    aside nav a { position: relative; transition: all 0.3s ease; }
    aside nav a:hover { background-color: rgba(37,99,235,0.15); transform: translateX(4px); }
    #loginPage { background: linear-gradient(135deg, #2563eb, #9333ea); }
    #loginBox { background-color: #fff; }
    .theme-dark #loginBox { background-color: #1f1f23; }
  </style>
</head>
<body class="theme-light transition-colors duration-300" style="background-color: var(--bg); color: var(--text)">

  <!-- LOGIN PAGE -->
  <div id="loginPage" class="fixed inset-0 flex items-center justify-center z-50">
    <div id="loginBox" class="p-10 rounded-2xl shadow-2xl w-96 text-center">
      <h2 class="text-3xl font-extrabold mb-6">Acesse o Sistema</h2>
      <form class="space-y-4">
        <input type="email" placeholder="E-mail" class="w-full px-4 py-3 rounded-md border focus:ring-2 focus:ring-blue-400" style="background-color: var(--input-bg); border-color: var(--input-border); color: var(--text)">
        <input type="password" placeholder="Senha" class="w-full px-4 py-3 rounded-md border focus:ring-2 focus:ring-blue-400" style="background-color: var(--input-bg); border-color: var(--input-border); color: var(--text)">
        <button type="button" id="loginBtn" class="w-full px-4 py-3 bg-gradient-to-r from-blue-600 to-purple-600 text-white rounded-md hover:opacity-90">Entrar</button>
      </form>
    </div>
  </div>

  <!-- HEADER -->
  <header class="hidden w-full shadow px-6 py-4 justify-between items-center fixed top-0 left-64 right-0 z-10" style="background-color: var(--bg-header); color: var(--text)" id="header">
    <h1 class="text-2xl font-bold">Sistema Moderno</h1>
    <div class="flex items-center space-x-4">
      <button id="notificationBtn" class="relative">
        <span class="text-xl">🔔</span>
        <span class="absolute -top-1 -right-1 bg-red-600 text-white text-xs px-1 rounded-full">3</span>
      </button>
      <button id="toggle-theme" class="px-4 py-2 rounded-lg transition" style="background-color: var(--table-header); color: var(--text)">Alternar Tema</button>
    </div>
  </header>

  <div class="flex pt-20 min-h-screen hidden" id="mainApp">
    <!-- SIDEBAR -->
    <aside class="w-64 p-4 space-y-4 fixed top-0 left-0 h-full shadow-lg" style="background-color: var(--bg-sidebar); color: var(--text)">
      <nav class="mt-20">
        <ul class="space-y-2">
          <li><a href="#" class="block px-3 py-2 rounded-lg" style="color: var(--text)">Dashboard</a></li>
          <li><a href="#" class="block px-3 py-2 rounded-lg" style="color: var(--text)">Cadastros</a></li>
          <li><a href="#" class="block px-3 py-2 rounded-lg" style="color: var(--text)">Estoque</a></li>
          <li><a href="#" class="block px-3 py-2 rounded-lg" style="color: var(--text)">Configurações</a></li>
        </ul>
      </nav>
    </aside>

    <!-- CONTEÚDO -->
    <main class="flex-1 p-8 ml-64 space-y-8 mt-16">
      <!-- BARRA DE AÇÕES -->
      <div class="flex justify-between items-center">
        <input type="text" placeholder="Pesquisar..." class="px-4 py-2 rounded-md border w-1/3" style="background-color: var(--input-bg); border-color: var(--input-border); color: var(--text)">
        <div class="space-x-2">
          <button class="px-3 py-2 bg-blue-500 text-white rounded-md hover:bg-blue-600">Atualizar</button>
          <button class="px-3 py-2 bg-green-500 text-white rounded-md hover:bg-green-600">Importar</button>
        </div>
      </div>

      <!-- FORMULÁRIO -->
      <section class="rounded-xl shadow p-6" style="background-color: var(--bg-header); color: var(--text)">
        <h2 class="text-lg font-semibold mb-4">Novo Usuário</h2>
        <form class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <input type="text" placeholder="Nome" class="px-3 py-2 rounded-md border focus:ring-2 focus:ring-blue-400" style="background-color: var(--input-bg); border-color: var(--input-border); color: var(--text)">
          <input type="email" placeholder="E-mail" class="px-3 py-2 rounded-md border focus:ring-2 focus:ring-blue-400" style="background-color: var(--input-bg); border-color: var(--input-border); color: var(--text)">
          <input type="password" placeholder="Senha" class="px-3 py-2 rounded-md border focus:ring-2 focus:ring-blue-400" style="background-color: var(--input-bg); border-color: var(--input-border); color: var(--text)">
          <button type="button" class="col-span-1 md:col-span-2 px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">Cadastrar</button>
        </form>
      </section>

      <!-- GRID DE DADOS -->
      <section class="rounded-xl shadow p-6" style="background-color: var(--bg-header); color: var(--text)">
        <h2 class="text-lg font-semibold mb-4">Tabela de Usuários</h2>
        <div class="overflow-x-auto">
          <table class="min-w-full rounded-lg" style="color: var(--text)">
            <thead style="background-color: var(--table-header);">
              <tr>
                <th class="px-4 py-2 text-left">Nome</th>
                <th class="px-4 py-2 text-left">E-mail</th>
                <th class="px-4 py-2 text-left">Status</th>
                <th class="px-4 py-2 text-left">Ações</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td class="px-4 py-2">Ana Souza</td>
                <td class="px-4 py-2">ana@email.com</td>
                <td class="px-4 py-2">Ativo</td>
                <td class="px-4 py-2 space-x-2">
                  <button class="px-2 py-1 bg-yellow-500 text-white rounded hover:bg-yellow-600" onclick="confirm('Editar registro?')">Editar</button>
                  <button class="px-2 py-1 bg-red-500 text-white rounded hover:bg-red-600" onclick="confirm('Excluir registro?')">Excluir</button>
                </td>
              </tr>
              <tr>
                <td class="px-4 py-2">Carlos Lima</td>
                <td class="px-4 py-2">carlos@email.com</td>
                <td class="px-4 py-2">Inativo</td>
                <td class="px-4 py-2 space-x-2">
                  <button class="px-2 py-1 bg-yellow-500 text-white rounded hover:bg-yellow-600" onclick="confirm('Editar registro?')">Editar</button>
                  <button class="px-2 py-1 bg-red-500 text-white rounded hover:bg-red-600" onclick="confirm('Excluir registro?')">Excluir</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

      <!-- GRÁFICO -->
      <section class="rounded-xl shadow p-6" style="background-color: var(--bg-header); color: var(--text)">
        <h2 class="text-lg font-semibold mb-4">Relatório de Vendas</h2>
        <canvas id="salesChart"></canvas>
      </section>
    </main>
  </div>

  <script>
    // Alternar tema
    const toggleTheme = document.getElementById('toggle-theme');
    toggleTheme.addEventListener('click', () => {
      if (document.body.classList.contains('theme-light')) {
        document.body.classList.remove('theme-light');
        document.body.classList.add('theme-dark');
      } else {
        document.body.classList.remove('theme-dark');
        document.body.classList.add('theme-light');
      }
    });

    // Login
    document.getElementById('loginBtn').addEventListener('click', () => {
      document.getElementById('loginPage').classList.add('hidden');
      document.getElementById('header').classList.remove('hidden');
      document.getElementById('mainApp').classList.remove('hidden');
    });

    // Gráfico
    new Chart(document.getElementById('salesChart'), {
      type: 'line',
      data: {
        labels: ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun'],
        datasets: [{
          label: 'Vendas',
          data: [12000, 15000, 13000, 20000, 18000, 22000],
          borderColor: '#2563eb',
          backgroundColor: 'rgba(37,99,235,0.2)',
          fill: true,
          tension: 0.4
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: true } }
      }
    });
  </script>
</body>
</html>
