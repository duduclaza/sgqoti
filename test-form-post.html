<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Form POST - Users API</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 300px; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 10px 20px; background: #007cba; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #005a87; }
        .result { margin-top: 20px; padding: 15px; border-radius: 4px; }
        .success { background: #d4edda; border: 1px solid #c3e6cb; color: #155724; }
        .error { background: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; }
        h2 { color: #333; border-bottom: 2px solid #007cba; padding-bottom: 10px; }
    </style>
</head>
<body>
    <h2>Teste da API Users.php - Formato Form POST</h2>
    
    <form id="userForm" action="backend/api/users.php" method="POST">
        <div class="form-group">
            <label for="action">Ação:</label>
            <select id="action" name="action" required>
                <option value="create_user">Criar Usuário</option>
                <option value="list_users">Listar Usuários</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="name">Nome Completo:</label>
            <input type="text" id="name" name="name" value="Teste Form POST" required>
        </div>
        
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" value="teste.form@exemplo.com" required>
        </div>
        
        <div class="form-group">
            <label for="username">Usuário:</label>
            <input type="text" id="username" name="username" value="teste_form" required>
        </div>
        
        <div class="form-group">
            <label for="password">Senha:</label>
            <input type="password" id="password" name="password" value="senha123" required>
        </div>
        
        <div class="form-group">
            <label for="role">Perfil:</label>
            <select id="role" name="role" required>
                <option value="user">Usuário</option>
                <option value="admin">Administrador</option>
                <option value="viewer">Visualizador</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="status">Status:</label>
            <select id="status" name="status" required>
                <option value="active">Ativo</option>
                <option value="inactive">Inativo</option>
            </select>
        </div>
        
        <button type="submit">Enviar via Form POST</button>
    </form>
    
    <h3>Teste via JavaScript (JSON):</h3>
    <button onclick="testJSON()">Testar JSON POST</button>
    
    <div id="result"></div>

    <script>
        // Interceptar form submit para mostrar resultado
        document.getElementById('userForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            
            try {
                const response = await fetch('backend/api/users.php', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.text();
                showResult('Form POST', response.status, result);
                
            } catch (error) {
                showResult('Form POST', 'ERROR', error.message);
            }
        });
        
        // Testar JSON POST
        async function testJSON() {
            const jsonData = {
                action: 'create_user',
                name: 'Teste JSON POST',
                email: 'teste.json@exemplo.com',
                username: 'teste_json',
                password: 'senha123',
                role: 'user',
                status: 'active'
            };
            
            try {
                const response = await fetch('backend/api/users.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(jsonData)
                });
                
                const result = await response.text();
                showResult('JSON POST', response.status, result);
                
            } catch (error) {
                showResult('JSON POST', 'ERROR', error.message);
            }
        }
        
        function showResult(method, status, response) {
            const resultDiv = document.getElementById('result');
            const isSuccess = status >= 200 && status < 300;
            
            resultDiv.innerHTML = `
                <div class="${isSuccess ? 'success' : 'error'} result">
                    <h4>Resultado ${method}:</h4>
                    <p><strong>Status:</strong> ${status}</p>
                    <p><strong>Resposta:</strong></p>
                    <pre>${response}</pre>
                </div>
            `;
        }
    </script>
</body>
</html>
